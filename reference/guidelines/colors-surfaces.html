<!-- @dsCard group="Colors" viewport="700x180" name="Backgrounds & surfaces" subtitle="Atom One Dark — warm #2c2a28 → base #282c34 → deep #21252b" -->
<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8">
<link rel="stylesheet" href="../styles.css">
<style>
  body { margin: 0; background: var(--surface-deep); padding: 22px 24px; }
  .row { display: flex; gap: 12px; }
  .chip { flex: 1; }
  .sw { height: 58px; border-radius: 8px; border: 1px solid var(--hairline-soft); display: flex; align-items: flex-end; padding: 8px; }
  .nm { font-family: var(--font-sans); font-size: 12px; color: var(--text-strong); margin-top: 8px; }
  .hx { font-family: var(--font-mono); font-size: 11px; color: var(--text-muted); }
</style>
</head>
<body>
  <div class="row">
    <div class="chip"><div class="sw" style="background:#2c2a28"></div><div class="nm">warm (tissue)</div><div class="hx">#2c2a28</div></div>
    <div class="chip"><div class="sw" style="background:#282c34"></div><div class="nm">base</div><div class="hx">#282c34</div></div>
    <div class="chip"><div class="sw" style="background:#21252b"></div><div class="nm">deep (code)</div><div class="hx">#21252b</div></div>
    <div class="chip"><div class="sw" style="background:#2f343e"></div><div class="nm">raised card</div><div class="hx">#2f343e</div></div>
    <div class="chip"><div class="sw" style="background:#3e4451"></div><div class="nm">hairline</div><div class="hx">#3e4451</div></div>
  </div>
</body>
</html>
