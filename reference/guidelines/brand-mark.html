<!-- @dsCard group="Brand" viewport="700x200" name="Brand mark — z as dendrite" subtitle="The one piece of custom iconography. Blue on dark, to 16px." -->
<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8">
<link rel="stylesheet" href="../styles.css">
<style>
  body { margin: 0; background: var(--surface); padding: 24px 26px; display: flex; align-items: center; gap: 28px; }
  .mark { width: 96px; height: 96px; border-radius: 20px; object-fit: cover; border: 1px solid var(--hairline-soft); }
  .small { display: flex; align-items: flex-end; gap: 14px; }
  .small img { border-radius: 6px; border: 1px solid var(--hairline-soft); }
  .cap { font-family: var(--font-sans); font-size: 11px; color: var(--text-faint); text-align: center; margin-top: 6px; }
  h4 { margin: 0 0 4px; }
  p { margin: 0; font-size: 13px; color: var(--text-muted); max-width: 30ch; }
</style>
</head>
<body data-scale="chromatin">
  <img class="mark" src="../assets/z-mark.png" alt="z dendrite mark">
  <div>
    <h4>zalibhai.com</h4>
    <p style="margin-bottom:14px">The letter z drawn as a branching neuron. Atom One Dark blue, #61afef.</p>
    <div class="small">
      <div><img src="../assets/z-mark.png" width="40" height="40" alt=""><div class="cap">app</div></div>
      <div><img src="../assets/z-mark.png" width="24" height="24" alt=""><div class="cap">32px</div></div>
      <div><img src="../assets/z-mark.png" width="16" height="16" alt=""><div class="cap">16px</div></div>
    </div>
  </div>
</body>
</html>
