<!-- @dsCard group="Colors" viewport="700x190" name="Scale accents — the descent" subtitle="Warm gold → cool green, one accent per biological scale" -->
<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8">
<link rel="stylesheet" href="../styles.css">
<style>
  body { margin: 0; background: var(--surface-deep); padding: 22px 24px; }
  .row { display: flex; gap: 14px; }
  .chip { flex: 1; display: flex; flex-direction: column; gap: 8px; }
  .sw { height: 64px; border-radius: 8px; border: 1px solid var(--hairline-soft); }
  .nm { font-family: var(--font-sans); font-size: 12.5px; color: var(--text-strong); }
  .hx { font-family: var(--font-mono); font-size: 11px; color: var(--text-muted); }
  .sc { font-family: var(--font-sans); font-size: 10px; letter-spacing: .12em; text-transform: uppercase; color: var(--text-faint); }
</style>
</head>
<body>
  <div class="row">
    <div class="chip"><div class="sw" style="background:#e5c07b"></div><div class="sc">tissue</div><div class="nm">gold-amber</div><div class="hx">#e5c07b</div></div>
    <div class="chip"><div class="sw" style="background:#d57aa5"></div><div class="sc">cellular</div><div class="nm">magenta-rose</div><div class="hx">#d57aa5</div></div>
    <div class="chip"><div class="sw" style="background:#61afef"></div><div class="sc">chromatin</div><div class="nm">blue · home</div><div class="hx">#61afef</div></div>
    <div class="chip"><div class="sw" style="background:#56b6c2"></div><div class="sc">protein</div><div class="nm">cyan</div><div class="hx">#56b6c2</div></div>
    <div class="chip"><div class="sw" style="background:#98c379"></div><div class="sc">code</div><div class="nm">green</div><div class="hx">#98c379</div></div>
  </div>
</body>
</html>
