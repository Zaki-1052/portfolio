<!-- @dsCard group="Spacing" viewport="700x190" name="Shadow & accent glow" subtitle="Subtle lift on a dark canvas; bloom fades toward code" -->
<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8">
<link rel="stylesheet" href="../styles.css">
<style>
  body { margin: 0; background: var(--surface-deep); padding: 30px 26px; }
  .row { display: flex; gap: 22px; }
  .u { flex: 1; display: flex; flex-direction: column; align-items: center; gap: 12px; }
  .box { width: 100%; height: 60px; background: var(--surface-raised); border-radius: var(--radius); border: 1px solid var(--hairline-soft); }
  .n { font-family: var(--font-mono); font-size: 11px; color: var(--text-muted); text-align: center; }
</style>
</head>
<body data-scale="tissue">
  <div class="row">
    <div class="u"><div class="box" style="box-shadow:var(--shadow-sm)"></div><div class="n">sm</div></div>
    <div class="u"><div class="box" style="box-shadow:var(--shadow-md)"></div><div class="n">md · cards</div></div>
    <div class="u"><div class="box" style="box-shadow:var(--shadow-lg)"></div><div class="n">lg</div></div>
    <div class="u"><div class="box" style="box-shadow:var(--glow-accent)"></div><div class="n">glow · bloom</div></div>
  </div>
</body>
</html>
