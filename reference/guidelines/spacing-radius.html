<!-- @dsCard group="Spacing" viewport="700x180" name="Radius is a signal" subtitle="Soft at warm scales → square at code. Never uniform." -->
<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8">
<link rel="stylesheet" href="../styles.css">
<style>
  body { margin: 0; background: var(--surface-deep); padding: 24px 26px; }
  .row { display: flex; gap: 16px; }
  .u { flex: 1; display: flex; flex-direction: column; align-items: center; gap: 10px; }
  .box { width: 100%; height: 62px; background: var(--surface-raised); border: 1px solid var(--hairline); }
  .n { font-family: var(--font-mono); font-size: 11px; color: var(--text-muted); text-align: center; }
  .s { font-family: var(--font-sans); font-size: 10px; letter-spacing:.1em; text-transform:uppercase; color: var(--text-faint); }
</style>
</head>
<body>
  <div class="row">
    <div class="u"><div class="box" style="border-radius:16px"></div><div class="s">tissue</div><div class="n">16px</div></div>
    <div class="u"><div class="box" style="border-radius:10px"></div><div class="s">cellular</div><div class="n">10px</div></div>
    <div class="u"><div class="box" style="border-radius:6px"></div><div class="s">chromatin</div><div class="n">6px</div></div>
    <div class="u"><div class="box" style="border-radius:2px"></div><div class="s">protein</div><div class="n">2px</div></div>
    <div class="u"><div class="box" style="border-radius:0"></div><div class="s">code</div><div class="n">0 · square</div></div>
  </div>
</body>
</html>
