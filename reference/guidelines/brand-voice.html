<!-- @dsCard group="Brand" viewport="700x220" name="Voice in one glance" subtitle="Sentence case, specific, no em dashes, no emoji, no negative parallelism" -->
<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8">
<link rel="stylesheet" href="../styles.css">
<style>
  body { margin: 0; background: var(--surface); padding: 20px 26px; }
  .l { display: flex; gap: 12px; align-items: flex-start; padding: 7px 0; font-family: var(--font-sans); font-size: 14px; }
  .yes { color: var(--aod-green); font-family: var(--font-mono); font-weight: 600; }
  .no { color: var(--aod-red); font-family: var(--font-mono); font-weight: 600; }
  .t { color: var(--text-body); }
  .t.bad { color: var(--text-faint); text-decoration: line-through; }
</style>
</head>
<body>
  <div class="l"><span class="yes">✓</span><span class="t">2,910 dysregulated loops in BAP1-knockout cerebellum.</span></div>
  <div class="l"><span class="no">✗</span><span class="t bad">Leveraged cutting-edge methods to unlock significant findings.</span></div>
  <div class="l"><span class="yes">✓</span><span class="t">I build the computational infrastructure. Mostly in R.</span></div>
  <div class="l"><span class="no">✗</span><span class="t bad">It's not about the tools. It's about the science.</span></div>
  <div class="l"><span class="yes">✓</span><span class="t">currently: molecular dynamics at Amaro Lab</span></div>
</body>
</html>
