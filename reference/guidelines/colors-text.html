<!-- @dsCard group="Colors" viewport="700x200" name="Text on dark — AA checked" subtitle="Four emphasis levels, all WCAG AA on the base background" -->
<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8">
<link rel="stylesheet" href="../styles.css">
<style>
  body { margin: 0; background: var(--surface); padding: 22px 26px; font-family: var(--font-sans); }
  .line { display: flex; align-items: baseline; justify-content: space-between; padding: 9px 0; border-bottom: 1px solid var(--hairline-soft); }
  .line:last-child { border-bottom: 0; }
  .lbl { font-size: 17px; }
  .meta { font-family: var(--font-mono); font-size: 11px; color: var(--text-faint); }
</style>
</head>
<body>
  <div class="line"><span class="lbl" style="color:var(--text-strong)">Strong — headings & high emphasis</span><span class="meta">#d7dae0 · 12.6:1</span></div>
  <div class="line"><span class="lbl" style="color:var(--text-body)">Body — default reading text</span><span class="meta">#abb2bf · 7.9:1</span></div>
  <div class="line"><span class="lbl" style="color:var(--text-muted)">Muted — labels & secondary</span><span class="meta">#828896 · 4.7:1</span></div>
  <div class="line"><span class="lbl" style="color:var(--text-faint)">Faint — decorative / large only</span><span class="meta">#5c6370 · 2.9:1</span></div>
</body>
</html>
