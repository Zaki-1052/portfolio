<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8">
<link rel="stylesheet" href="../styles.css">
<style>
  body { margin: 0; background: var(--surface); padding: 20px 26px; }
  .r { display: flex; align-items: baseline; gap: 16px; padding: 4px 0; }
  .t { color: var(--text-strong); font-family: var(--font-sans); line-height: 1.1; white-space: nowrap; }
  .m { font-family: var(--font-mono); font-size: 11px; color: var(--text-faint); margin-left: auto; }
</style>
</head>
<body>
  <div class="r"><span class="t" style="font-size:56px;letter-spacing:-.02em">Descent</span><span class="m">5xl · 80 → display</span></div>
  <div class="r"><span class="t" style="font-size:40px;letter-spacing:-.02em">tissue → code</span><span class="m">3xl · 44 · h1</span></div>
  <div class="r"><span class="t" style="font-size:28px">Chromatin fiber</span><span class="m">xl · 28 · h3</span></div>
  <div class="r"><span class="t" style="font-size:18px;color:var(--text-body)">Lead body, generous and airy at the top.</span><span class="m">md · 18 · lead</span></div>
  <div class="r"><span class="t" style="font-size:16px;color:var(--text-body)">Body text, 16px, the reading baseline.</span><span class="m">base · 16</span></div>
  <div class="r"><span class="t" style="font-size:12.5px;color:var(--text-muted)">Tags, captions, fine print</span><span class="m">xs · 12.5</span></div>

</html>
