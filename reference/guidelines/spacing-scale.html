<!-- @dsCard group="Spacing" viewport="700x150" name="Spacing scale" subtitle="4px base — 4 · 8 · 12 · 16 · 24 · 32 · 48 · 64" -->
<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8">
<link rel="stylesheet" href="../styles.css">
<style>
  body { margin: 0; background: var(--surface); padding: 24px 26px; }
  .row { display: flex; align-items: flex-end; gap: 16px; }
  .u { display: flex; flex-direction: column; align-items: center; gap: 8px; }
  .bar { background: var(--accent); border-radius: 2px; width: 100%; }
  .n { font-family: var(--font-mono); font-size: 11px; color: var(--text-muted); }
</style>
</head>
<body data-scale="chromatin">
  <div class="row">
    <div class="u" style="width:18px"><div class="bar" style="height:4px"></div><div class="n">4</div></div>
    <div class="u" style="width:22px"><div class="bar" style="height:8px"></div><div class="n">8</div></div>
    <div class="u" style="width:26px"><div class="bar" style="height:12px"></div><div class="n">12</div></div>
    <div class="u" style="width:30px"><div class="bar" style="height:16px"></div><div class="n">16</div></div>
    <div class="u" style="width:36px"><div class="bar" style="height:24px"></div><div class="n">24</div></div>
    <div class="u" style="width:44px"><div class="bar" style="height:32px"></div><div class="n">32</div></div>
    <div class="u" style="width:56px"><div class="bar" style="height:48px"></div><div class="n">48</div></div>
    <div class="u" style="width:70px"><div class="bar" style="height:64px"></div><div class="n">64</div></div>
  </div>
</body>
</html>
