<!-- @dsCard group="Brand" viewport="700x150" name="Depth label & eyebrow" subtitle="Micro all-caps, lowercase scale names, · separator" -->
<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8">
<link rel="stylesheet" href="../styles.css">
<style>
  body { margin: 0; background: var(--surface); padding: 24px 26px; display: flex; flex-direction: column; gap: 18px; }
  .lbl { display: flex; align-items: center; gap: 10px; }
  .dot { width: 7px; height: 7px; border-radius: 50%; background: var(--accent); box-shadow: var(--glow-accent); }
  .txt { font-family: var(--font-sans); font-size: 11px; letter-spacing: .14em; text-transform: uppercase; color: var(--text-muted); }
</style>
</head>
<body>
  <div data-scale="cellular" class="lbl"><span class="dot"></span><span class="txt">cellular · 100×</span></div>
  <div data-scale="chromatin" class="lbl"><span class="dot"></span><span class="txt">chromatin · 10,000×</span></div>
  <div data-scale="code" class="lbl"><span class="dot"></span><span class="txt">code · sequence level</span></div>
</body>
</html>
