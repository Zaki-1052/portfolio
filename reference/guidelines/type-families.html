<!-- @dsCard group="Type" viewport="700x210" name="Three families" subtitle="Lora serif (warm) · Inter sans (body) · Fira Code mono (cool)" -->
<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8">
<link rel="stylesheet" href="../styles.css">
<style>
  body { margin: 0; background: var(--surface); padding: 22px 26px; }
  .spec { padding: 10px 0; border-bottom: 1px solid var(--hairline-soft); }
  .spec:last-child { border-bottom: 0; }
  .word { color: var(--text-strong); font-size: 30px; line-height: 1.15; }
  .meta { font-family: var(--font-sans); font-size: 11px; letter-spacing: .1em; text-transform: uppercase; color: var(--text-faint); margin-bottom: 2px; }
</style>
</head>
<body>
  <div class="spec"><div class="meta">Lora · serif · tissue, cellular</div><div class="word" style="font-family:var(--font-serif)">Purkinje neuron</div></div>
  <div class="spec"><div class="meta">Inter · sans · body everywhere</div><div class="word" style="font-family:var(--font-sans)">Replicate-aware loop calling</div></div>
  <div class="spec"><div class="meta">Fira Code · mono · code, expression</div><div class="word" style="font-family:var(--font-mono)">~/projects $ ls -la</div></div>
</body>
</html>
