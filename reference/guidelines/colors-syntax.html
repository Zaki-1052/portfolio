<!-- @dsCard group="Colors" viewport="700x170" name="Terminal syntax" subtitle="Atom One Dark syntax colors for the code-scale listings" -->
<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8">
<link rel="stylesheet" href="../styles.css">
<style>
  body { margin: 0; background: var(--surface-deep); padding: 22px 26px; }
  pre { margin: 0; font-family: var(--font-mono); font-size: 13.5px; line-height: 1.7; }
  .kw { color: var(--syntax-keyword); }
  .st { color: var(--syntax-string); }
  .fn { color: var(--syntax-fn); }
  .nu { color: var(--syntax-number); }
  .cm { color: var(--syntax-comment); }
  .pm { color: var(--syntax-perm); }
  .sr { color: var(--syntax-star); }
  .pl { color: var(--text-body); }
</style>
</head>
<body>
<pre><span class="cm"># differential loop calling</span>
<span class="kw">const</span> <span class="pl">loops</span> = <span class="fn">callLoops</span>(<span class="st">"bap1-ko"</span>, { fdr: <span class="nu">0.05</span> })
<span class="pm">drwxr-xr-x</span>  <span class="fn">GPTPortal</span>   multi-provider chat   <span class="sr">★ 397</span></pre>
</body>
</html>
