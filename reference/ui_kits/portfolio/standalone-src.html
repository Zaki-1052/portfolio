<!-- @dsCard group="Portfolio" viewport="1200x780" name="Scale-descent portfolio" subtitle="Interactive recreation — scroll or use the depth nav to descend" -->
<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>Zara Alibhai — biological scale descent</title>
<meta name="ext-resource-dependency" content="../../assets/z-mark.png" data-resource-id="zmark" />
<template id="__bundler_thumbnail" data-bg-color="#2c2a28">
  <svg viewBox="0 0 1200 800" xmlns="http://www.w3.org/2000/svg">
    <rect width="1200" height="800" fill="#2c2a28"/>
    <g stroke="#61afef" stroke-width="20" stroke-linecap="round" fill="none">
      <path d="M460 300 H740"/>
      <path d="M740 300 L470 520"/>
      <path d="M470 520 H740"/>
      <path d="M740 300 L700 210 M740 300 L770 200 M740 300 L800 230"/>
      <path d="M470 520 L430 600 M470 520 L460 615 M470 520 L520 600"/>
    </g>
  </svg>
</template>
<link rel="icon" href="../../assets/z-mark.png">
<link rel="stylesheet" href="../../styles.css">
<link rel="stylesheet" href="kit.css">
<style>
  html { scroll-behavior: smooth; }
  body { margin: 0; background: var(--surface); }
  main { position: relative; z-index: var(--z-content); }
  /* each scale section already provides its own bg via [data-scale] */
  .descend { display: block; }

  /* ---- Tweak: type voice — how far the serif / mono identity reaches ---- */
  /* balanced = token defaults (serif top, sans middle, mono bottom) */
  [data-typevoice="serif"] [data-scale="chromatin"],
  [data-typevoice="serif"] [data-scale="protein"]   { --font-heading: var(--font-serif); }
  [data-typevoice="mono"]  [data-scale="cellular"]   { --font-heading: var(--font-sans); }
  [data-typevoice="mono"]  [data-scale="chromatin"],
  [data-typevoice="mono"]  [data-scale="protein"]    { --font-heading: var(--font-mono); }

  /* ---- Tweak: density — generous & airy vs tight & technical ---- */
  [data-density="airy"] {
    --section-pad-y: clamp(6rem, 15vh, 11rem);
    --text-5xl: 6rem; --text-3xl: 3.3rem; --text-lg: 1.55rem;
    --leading-relaxed: 1.95; --leading-normal: 1.72;
    --measure: 60ch; --space-7: 4rem;
  }
  [data-density="dense"] {
    --section-pad-y: clamp(2.25rem, 6vh, 4rem);
    --text-5xl: 3.7rem; --text-3xl: 2.15rem; --text-lg: 1.25rem;
    --leading-relaxed: 1.5; --leading-normal: 1.42;
    --measure: 74ch; --space-7: 2rem;
  }
</style>
</head>
<body>
<a class="visually-hidden" href="#chromatin">Skip to publications</a>
<main id="root"></main>

<script src="https://unpkg.com/react@18.3.1/umd/react.development.js" integrity="sha384-hD6/rw4ppMLGNu3tX5cjIb+uRZ7UkRJ6BPkLpg4hAu/6onKUg4lLsHAs9EBPT82L" crossorigin="anonymous"></script>
<script src="https://unpkg.com/react-dom@18.3.1/umd/react-dom.development.js" integrity="sha384-u6aeetuaXnQ38mYT8rp6sbXaQe3NL9t+IBXmnYxwkUI2Hw4bsp2Wvmx4yRQF1uAm" crossorigin="anonymous"></script>
<script src="https://unpkg.com/@babel/standalone@7.29.0/babel.min.js" integrity="sha384-m08KidiNqLdpJqLq95G/LEi8Qvjl/xUYll3QILypMoQ65QorJ9Lvtp2RXYGBFj1y" crossorigin="anonymous"></script>
<script src="../../_ds_bundle.js"></script>
<script type="text/babel" data-presets="react" src="tweaks-panel.jsx"></script>

<script type="text/babel" data-presets="react" src="ArrivalHero.jsx"></script>
<script type="text/babel" data-presets="react" src="DendriteIndex.jsx"></script>
<script type="text/babel" data-presets="react" src="ChromatinPublications.jsx"></script>
<script type="text/babel" data-presets="react" src="ProteinMD.jsx"></script>
<script type="text/babel" data-presets="react" src="CodeTerminal.jsx"></script>
<script type="text/babel" data-presets="react" src="Contact.jsx"></script>

<script type="text/babel" data-presets="react">
  const { DepthIndicator } = window.BiologicalScaleDescentDesignSystem_acc404;

  const TWEAK_DEFAULTS = /*EDITMODE-BEGIN*/{
    "atmosphere": 1,
    "typeVoice": "balanced",
    "density": "standard"
  }/*EDITMODE-END*/;

  const SCALES = [
    { id: "tissue",     name: "tissue",     magnification: "1×",          Screen: window.ArrivalHero },
    { id: "cellular",   name: "cellular",   magnification: "100×",        Screen: window.DendriteIndex },
    { id: "chromatin",  name: "chromatin",  magnification: "10,000×",     Screen: window.ChromatinPublications },
    { id: "protein",    name: "protein",    magnification: "1,000,000×",  Screen: window.ProteinMD },
    { id: "code",       name: "code",       magnification: "sequence",    Screen: window.CodeTerminal },
    { id: "expression", name: "expression", magnification: "contact",     Screen: window.Contact },
  ];

  function App() {
    const [t, setTweak] = useTweaks(TWEAK_DEFAULTS);
    const [active, setActive] = React.useState("tissue");
    const [progress, setProgress] = React.useState(0);
    const refs = React.useRef({});

    // Atmosphere reshapes the post-processing feel: film grain + golden bloom
    // at the warm scales, plus how far the accent glow blooms everywhere.
    React.useEffect(() => {
      const root = document.documentElement;
      const a = t.atmosphere;
      root.style.setProperty("--grain", (a * 0.085).toFixed(3));
      root.style.setProperty("--bloom", (a * 1.05).toFixed(2));
      root.style.setProperty("--glow-accent", `0 0 ${Math.round(8 + a * 36)}px -6px var(--accent-line)`);
    }, [t.atmosphere]);

    React.useEffect(() => {
      document.documentElement.setAttribute("data-typevoice", t.typeVoice);
    }, [t.typeVoice]);

    React.useEffect(() => {
      document.documentElement.setAttribute("data-density", t.density);
    }, [t.density]);

    React.useEffect(() => {
      const onScroll = () => {
        const mid = window.scrollY + window.innerHeight * 0.42;
        let current = SCALES[0].id;
        for (const s of SCALES) {
          const el = refs.current[s.id];
          if (el && el.offsetTop <= mid) current = s.id;
        }
        const el = refs.current[current];
        if (el) {
          const p = (window.scrollY + window.innerHeight * 0.42 - el.offsetTop) / el.offsetHeight;
          setProgress(Math.max(0, Math.min(1, p)));
        }
        setActive(current);
        history.replaceState(null, "", "#" + current);
      };
      window.addEventListener("scroll", onScroll, { passive: true });
      onScroll();
      return () => window.removeEventListener("scroll", onScroll);
    }, []);

    const jump = (id) => {
      const el = refs.current[id];
      if (el) el.scrollIntoView({ behavior: "smooth", block: "start" });
    };

    return (
      <>
        {SCALES.map(({ id, Screen }) => (
          <div
            key={id}
            id={id}
            data-screen-label={id}
            ref={(n) => (refs.current[id] = n)}
            className="descend"
          >
            <Screen />
          </div>
        ))}
        <div data-scale={active}>
          <DepthIndicator scales={SCALES} activeId={active} progress={progress} onJump={jump} />
        </div>

        <TweaksPanel title="Tweaks">
          <TweakSection label="Atmosphere" />
          <TweakSlider
            label="Post-processing"
            value={t.atmosphere}
            min={0}
            max={1.4}
            step={0.05}
            onChange={(v) => setTweak("atmosphere", v)}
          />
          <TweakSection label="Type voice" />
          <TweakRadio
            label="Heading register"
            value={t.typeVoice}
            options={["serif", "balanced", "mono"]}
            onChange={(v) => setTweak("typeVoice", v)}
          />
          <TweakSection label="Density" />
          <TweakRadio
            label="Rhythm"
            value={t.density}
            options={["airy", "standard", "dense"]}
            onChange={(v) => setTweak("density", v)}
          />
        </TweaksPanel>
      </>
    );
  }

  ReactDOM.createRoot(document.getElementById("root")).render(<App />);
</script>
</body>
</html>
