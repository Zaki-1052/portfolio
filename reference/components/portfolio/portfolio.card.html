<!-- @dsCard group="Components" viewport="700x560" name="Portfolio — ScaleSection · ProjectCard · TerminalListing · DepthIndicator" subtitle="The scale-descent building blocks" -->
<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8">
<link rel="stylesheet" href="../../styles.css">
<style>
  body { margin: 0; background: var(--surface); padding: 22px 26px; }
  .stack { display: flex; flex-direction: column; gap: 22px; }
  .lbl { font-family: var(--font-sans); font-size: 10px; letter-spacing: .12em; text-transform: uppercase; color: var(--text-faint); margin-bottom: 10px; }
  .depthwrap { display: flex; gap: 20px; align-items: stretch; }
  .depthwrap .panel { flex: 1; }
</style>
</head>
<body>
<div id="root"></div>
<script src="https://unpkg.com/react@18.3.1/umd/react.development.js" integrity="sha384-hD6/rw4ppMLGNu3tX5cjIb+uRZ7UkRJ6BPkLpg4hAu/6onKUg4lLsHAs9EBPT82L" crossorigin="anonymous"></script>
<script src="https://unpkg.com/react-dom@18.3.1/umd/react-dom.development.js" integrity="sha384-u6aeetuaXnQ38mYT8rp6sbXaQe3NL9t+IBXmnYxwkUI2Hw4bsp2Wvmx4yRQF1uAm" crossorigin="anonymous"></script>
<script src="https://unpkg.com/@babel/standalone@7.29.0/babel.min.js" integrity="sha384-m08KidiNqLdpJqLq95G/LEi8Qvjl/xUYll3QILypMoQ65QorJ9Lvtp2RXYGBFj1y" crossorigin="anonymous"></script>
<script src="../../_ds_bundle.js"></script>
<script type="text/babel" data-presets="react">
  const { ScaleSection, ProjectCard, TerminalListing, DepthIndicator } =
    window.BiologicalScaleDescentDesignSystem_acc404;

  function Demo() {
    const [active, setActive] = React.useState("chromatin");
    const scales = [
      { id: "tissue", name: "tissue", magnification: "1×" },
      { id: "cellular", name: "cellular", magnification: "100×" },
      { id: "chromatin", name: "chromatin", magnification: "10,000×" },
      { id: "protein", name: "protein", magnification: "1,000,000×" },
      { id: "code", name: "code", magnification: "sequence" },
    ];
    return (
      <div className="stack">
        <div className="depthwrap">
          <div className="panel">
            <div className="lbl">ProjectCard — chromatin scale</div>
            <div data-scale="chromatin">
              <ProjectCard
                title="Chromatin conformation analysis (Hi-C)"
                href="#"
                description="Replicate-aware differential loop calling. 2,910 dysregulated loops in BAP1-knockout mouse cerebellum."
                tags={["R", "mariner", "edgeR", "Hi-C"]}
                meta="Ferguson Lab"
              />
            </div>
          </div>
          <div>
            <div className="lbl">DepthIndicator</div>
            <div data-scale={active} style={{padding: "8px 30px 8px 8px", border: "1px solid var(--hairline-soft)", borderRadius: 8, height: "calc(100% - 26px)"}}>
              <DepthIndicator inline scales={scales} activeId={active} progress={0.45} onJump={setActive} />
            </div>
          </div>
        </div>

        <div>
          <div className="lbl">TerminalListing — code scale</div>
          <div data-scale="code">
            <TerminalListing
              cwd="~/projects"
              items={[
                { name: "GPTPortal", description: "Multi-provider AI chat interface", stars: 397, href: "#" },
                { name: "WebReg", description: "UCSD course auto-enroller (Rust)", href: "#" },
                { name: "MetaENCODE", description: "ENCODE similarity engine (SBERT)", href: "#" },
              ]}
            />
          </div>
        </div>

        <div>
          <div className="lbl">ScaleSection — tissue (serif, warm, soft radius)</div>
          <div style={{border: "1px solid var(--hairline-soft)", borderRadius: 8, overflow: "hidden"}}>
            <ScaleSection scale="tissue" magnification="1×" kicker="computational biology @ UCSD" title="Zara Alibhai" style={{padding: "28px 32px"}}>
              <p className="prose" style={{fontSize: 15}}>I build computational infrastructure for epigenetics. Mostly cerebellum, mostly chromatin, mostly in R and my terminal.</p>
            </ScaleSection>
          </div>
        </div>
      </div>
    );
  }
  ReactDOM.createRoot(document.getElementById("root")).render(<Demo />);
</script>
</body>
</html>
