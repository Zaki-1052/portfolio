<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8">
<link rel="stylesheet" href="../../styles.css">
<style>
  body { margin: 0; background: var(--surface); padding: 22px 26px; }
  .group { display: flex; flex-direction: column; gap: 18px; }
  .row { display: flex; align-items: center; gap: 12px; flex-wrap: wrap; }
  .lbl { font-family: var(--font-sans); font-size: 10px; letter-spacing: .12em; text-transform: uppercase; color: var(--text-faint); width: 100%; }
  .scales { display: grid; grid-template-columns: 1fr 1fr 1fr; gap: 12px; }
  .scell { padding: 14px; border: 1px solid var(--hairline-soft); border-radius: var(--radius); }
</style>
</head>
<body>
<div id="root"></div>
<script src="https://unpkg.com/react@18.3.1/umd/react.development.js" integrity="sha384-hD6/rw4ppMLGNu3tX5cjIb+uRZ7UkRJ6BPkLpg4hAu/6onKUg4lLsHAs9EBPT82L" crossorigin="anonymous"></script>
<script src="https://unpkg.com/react-dom@18.3.1/umd/react-dom.development.js" integrity="sha384-u6aeetuaXnQ38mYT8rp6sbXaQe3NL9t+IBXmnYxwkUI2Hw4bsp2Wvmx4yRQF1uAm" crossorigin="anonymous"></script>
<script src="https://unpkg.com/@babel/standalone@7.29.0/babel.min.js" integrity="sha384-m08KidiNqLdpJqLq95G/LEi8Qvjl/xUYll3QILypMoQ65QorJ9Lvtp2RXYGBFj1y" crossorigin="anonymous"></script>
<script src="../../_ds_bundle.js"></script>
<script type="text/babel" data-presets="react">
  const { Button, Tag, ScaleLabel } = window.BiologicalScaleDescentDesignSystem_acc404;
  function Demo() {
    return (
      <div className="group">
        <div className="row" data-scale="chromatin">
          <span className="lbl">button — variants</span>
          <Button variant="solid">Read the CV</Button>
          <Button variant="ghost" iconRight={<span aria-hidden="true">↗</span>}>GitHub</Button>
          <Button variant="text">back to overview</Button>
          <Button variant="ghost" disabled>disabled</Button>
        </div>
        <div className="row" data-scale="chromatin">
          <span className="lbl">tag</span>
          <Tag>R</Tag><Tag>mariner</Tag><Tag>edgeR</Tag><Tag tone="accent">epigenetics</Tag>
        </div>
        <div>
          <span className="lbl" style={{display:'block', marginBottom: 10}}>scale label — accent + radius shift per scale</span>
          <div className="scales">
            <div className="scell" data-scale="tissue"><ScaleLabel scale="tissue" magnification="1×" /><div style={{marginTop:12}}><Button variant="ghost" size="sm">tissue</Button></div></div>
            <div className="scell" data-scale="cellular"><ScaleLabel scale="cellular" magnification="100×" /><div style={{marginTop:12}}><Button variant="ghost" size="sm">cellular</Button></div></div>
            <div className="scell" data-scale="code"><ScaleLabel scale="code" dot={true} /><div style={{marginTop:12}}><Button variant="ghost" size="sm">code</Button></div></div>
          </div>
        </div>
      </div>
    );
  }
  ReactDOM.createRoot(document.getElementById("root")).render(<Demo />);
</script>
</body>
</html>
